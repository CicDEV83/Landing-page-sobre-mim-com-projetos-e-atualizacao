<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto 1 | App Clima</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="app" aria-labelledby="titulo-projeto">
      <header class="app__header">
        <p class="tag">Projeto 1</p>
        <h1 id="titulo-projeto">App Clima</h1>
        <p id="saudacao" class="saudacao">Boa noite</p>
        <p id="relogio" class="relogio" aria-live="polite"></p>
        <p id="dispositivo" class="device-info"></p>
      </header>

      <section class="painel" aria-labelledby="buscar-cidade">
        <div class="section-title">
          <h2 id="buscar-cidade">Buscar cidade</h2>
          <button
            id="usarLocalizacao"
            class="button button--ghost"
            type="button"
          >
            Usar localização
          </button>
        </div>

        <form id="formUsuario" class="user-form">
          <label for="nomeInput">Seu nome</label>
          <div class="user-form__row">
            <input
              type="text"
              id="nomeInput"
              name="nome"
              placeholder="Ex: Cícero"
              autocomplete="given-name"
            />
            <button class="button button--ghost" type="submit">Salvar</button>
          </div>
        </form>

        <form id="formClima" class="search-form">
          <label for="cidadeInput">Digite a cidade</label>
          <div class="search-form__row">
            <input
              type="text"
              id="cidadeInput"
              name="cidade"
              placeholder="Ex: São Paulo"
              autocomplete="address-level2"
              required
            />
            <button class="button" type="submit">Buscar</button>
          </div>
        </form>

        <p id="loading" class="status" role="status" aria-live="polite" hidden>
          Buscando clima...
        </p>
        <p id="erro" class="status status--erro" role="alert" hidden></p>
      </section>

      <section class="resultado" aria-labelledby="resultado-clima">
        <h2 id="resultado-clima">Resultado do clima</h2>

        <figure class="weather-icon">
          <img id="icone" src="" alt="" hidden />
        </figure>

        <article class="weather-card" aria-live="polite">
          <h3 id="cidade">Pesquise uma cidade</h3>
          <p id="descricao">Os dados do clima aparecerão aqui.</p>

          <div class="weather-grid">
            <p id="temperatura">Temperatura: --</p>
            <p id="temperaturaMinima">Mínima: --</p>
            <p id="temperaturaMaxima">Máxima: --</p>
            <p id="sensacao">Sensação: --</p>
            <p id="umidade">Umidade: --</p>
            <p id="vento">Vento: --</p>
            <p id="atualizacao">Atualizado: --</p>
          </div>
        </article>
      </section>

      <nav class="project-nav" aria-label="Navegação do projeto">
        <a href="../index.html">Voltar ao portfólio</a>
      </nav>
    </main>

    <script src="script.js"></script>
  </body>
</html>
