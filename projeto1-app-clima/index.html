<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto 1 | App Clima</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main>
      <header>
        <h1 id="saudacao">Boa noite</h1>
        <p id="relogio"></p>
      </header>

      <section aria-labelledby="buscar-cidade">
        <h2 id="buscar-cidade">Buscar Cidade</h2>

        <form id="formClima">
          <label for="cidadeInput">Digite a cidade:</label>
          <input type="text" id="cidadeInput" name="cidade" required />
          <button type="submit">Buscar</button>
        </form>
      </section>

      <section aria-labelledby="resultado-clima">
        <h2 id="resultado-clima">Resultado do Clima</h2>

        <figure>
          <img id="icone" src="" alt="Ícone do clima" />
        </figure>

        <article>
          <h3 id="cidade"></h3>
          <p id="temperatura"></p>
          <p id="descricao"></p>
          <p id="umidade"></p>
        </article>
      </section>

      <nav>
        <button type="button" onclick="voltar()">
          Voltar para a Landing Page
        </button>
      </nav>
    </main>

    <script src="script.js"></script>
  </body>
</html>
