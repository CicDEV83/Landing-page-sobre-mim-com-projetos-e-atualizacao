<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Portfólio de Cicero W. Silva, Desenvolvedor Fullstack em formação focado em HTML5, CSS3 e JavaScript moderno.">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <title>Cicero W. Silva | Fullstack Developer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LOADER -->
    <div class="loader">
        <div class="spinner"></div>
    </div>

    <!-- PARTICLES BACKGROUND -->
    <canvas id="particles"></canvas>

    <!-- HERO -->
    <header class="hero">
        <div class="hero-content">

            <img src="img/WhatsApp Image 2026-02-17 at 09.11.30.jpeg"
                alt="Foto de perfil de Cicero W. Silva"
                class="foto-perfil">

            <h1 class="typing" data-text="Cicero W. Silva"></h1>

            <p class="typing typing-dot"
                data-text="Fullstack Developer em formação para o mercado nacional ou internacional">
            </p>

            <!-- Botão correto (apenas <a>) -->
            <a href="projetos.html"
               class="botao-projetos typing"
               data-text="Ver Projetos">
            </a>

        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main>

        <!-- SOBRE -->
        <section id="sobre">
            <h2 class="typing" data-text="Sobre mim"></h2>

            <p class="typing typing-dot"
                data-text="Estou em jornada para me tornar um Desenvolvedor Fullstack focado no mercado nacional ou internacional, estudando HTML5, CSS3 e JavaScript moderno">
            </p>
        </section>

        <!-- HABILIDADES -->
        <section id="habilidades">
            <h2 class="typing" data-text="Habilidades em desenvolvimento"></h2>

            <div class="skills">

                <a href="https://www.w3schools.com/html/"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="skill-card"
                   data-tooltip="Clique para aprender HTML">
                    HTML5
                </a>

                <a href="https://www.w3schools.com/css/"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="skill-card"
                   data-tooltip="Clique para aprender CSS">
                    CSS3
                </a>

                <a href="https://www.w3schools.com/js/"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="skill-card"
                   data-tooltip="Clique para aprender JavaScript">
                    JavaScript
                </a>

            </div>
        </section>

        <!-- CONTATO -->
        <section id="contato">
            <h2 class="typing" data-text="Contato"></h2>
            <button id="botaoContato">Fale comigo</button>
        </section>

        <!-- REFERÊNCIAS (ÚLTIMA SECTION DO MAIN) -->
        <section id="referencias">
            <h2>Referências de Estudo</h2>

            <p class="typing typing-dot" data-text="Parte do meu aprendizado contínuo é baseado em plataformas reconhecidas
                internacionalmente na área de desenvolvimento web">
            </p>

            <div class="referencias-links">
                <a href="https://www.w3schools.com/"
                   target="_blank"
                   rel="noopener noreferrer">
                    W3Schools – Documentação e Tutoriais Web
                </a>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 - Cicero W. Silva - Todos os direitos reservados</p>
    </footer>

    <!-- CURSOR CUSTOM -->
    <div class="cursor"></div>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>
</html>
